name: Build Package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ''
      slackpkg_deps:
        required: false
        type: string
        default: ''
      sbopkg_deps:
        required: false
        type: string
        default: ''

jobs:
  build-package:
    runs-on: ubuntu-latest
    container:
      image: tankmek/slackware:15.0
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Update Slackware package database
        run: |
          echo y | slackpkg gpg update
          echo y | slackpkg update
          echo y | slackpkg upgrade-all

      - name: Install baseline build tools
        run: |
          echo y | slackpkg install \
            gcc gcc-g++ make cmake autoconf automake libtool pkg-config \
            binutils gettext kernel-headers m4 glibc-i18n glibc-profile \
            guile gc patch python3 libarchive diffutils || true
          ldconfig

      - name: Install slackpkg dependencies
        if: inputs.slackpkg_deps != ''
        run: |
          echo "Installing slackpkg dependencies: ${{ inputs.slackpkg_deps }}"
          echo y | slackpkg install ${{ inputs.slackpkg_deps }} || true
          ldconfig

      - name: Install sbopkg dependencies
        if: inputs.sbopkg_deps != ''
        run: |
          sbopkg -r
          for dep in ${{ inputs.sbopkg_deps }}; do
            echo "Installing sbopkg dependency: $dep"
            sbopkg -B -i "$dep"
          done

      - name: Debug pkg-config paths
        if: inputs.package == 'usbguard'
        run: |
          echo "=== pkg-config built-in search path ==="
          pkg-config --variable pc_path pkg-config || echo "failed to get pc_path"
          echo ""
          echo "=== PKG_CONFIG_PATH env ==="
          echo "${PKG_CONFIG_PATH:-<unset>}"
          echo ""
          echo "=== .pc files in /usr/lib64/pkgconfig (filtered) ==="
          ls /usr/lib64/pkgconfig/ 2>/dev/null | grep -iE "dbus|gio|glib|gobject|polkit" || echo "none found or dir missing"
          echo ""
          echo "=== .pc files in /usr/lib/pkgconfig (filtered) ==="
          ls /usr/lib/pkgconfig/ 2>/dev/null | grep -iE "dbus|gio|glib|gobject|polkit" || echo "none found or dir missing"
          echo ""
          echo "=== .pc files in /usr/share/pkgconfig (filtered) ==="
          ls /usr/share/pkgconfig/ 2>/dev/null | grep -iE "dbus|gio|glib|gobject|polkit" || echo "none found or dir missing"
          echo ""
          echo "=== Testing individual pkg-config modules ==="
          for mod in dbus-1 gio-2.0 glib-2.0 gobject-2.0 polkit-gobject-1; do
            if pkg-config --exists "$mod" 2>/dev/null; then
              echo "$mod: FOUND ($(pkg-config --modversion $mod))"
            else
              echo "$mod: NOT FOUND"
              pkg-config --print-errors "$mod" 2>&1 || true
            fi
          done

      - name: Copy package to build directory
        run: |
          PKG="${{ inputs.package }}"
          mkdir -p /tmp/SBo
          cp -r "./${PKG}" "/tmp/SBo/${PKG}"

      - name: Download source tarball
        run: |
          PKG="${{ inputs.package }}"
          cd "/tmp/SBo/${PKG}"

          if [ ! -f "${PKG}.info" ]; then
            echo "No .info file found, assuming source is bundled"
            exit 0
          fi

          DOWNLOAD_URL=$(grep '^DOWNLOAD=' "${PKG}.info" | cut -d'"' -f2)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "Error: DOWNLOAD field is empty in ${PKG}.info"
            exit 1
          fi

          echo "Downloading: $DOWNLOAD_URL"
          wget -c --content-disposition "$DOWNLOAD_URL"

          # Strip query parameters from downloaded filenames (e.g. SourceForge ?viasf=1)
          for f in *\?*; do
            [ -e "$f" ] && mv "$f" "${f%%\?*}"
          done

      - name: Run SlackBuild
        run: |
          PKG="${{ inputs.package }}"
          cd "/tmp/SBo/${PKG}"

          if [ -f "${PKG}.info" ]; then
            export VERSION=$(grep '^VERSION=' "${PKG}.info" | cut -d'"' -f2)
            echo "Building ${PKG} version ${VERSION}"
          fi

          chmod +x "${PKG}.SlackBuild"
          "./${PKG}.SlackBuild"

      - name: Run sbopkglint
        run: |
          PKG="${{ inputs.package }}"

          echo "Installing sbo-maintainer-tools"
          sbopkg -r || true
          sbopkg -B -i sbo-maintainer-tools

          if [ -f "/tmp/SBo/${PKG}/${PKG}.info" ]; then
            VERSION=$(grep '^VERSION=' "/tmp/SBo/${PKG}/${PKG}.info" | cut -d'"' -f2)
          fi

          pkg_file=$(find /tmp -maxdepth 1 -name "${PKG}-${VERSION}-*.t?z" | head -n1)
          if [ -z "$pkg_file" ]; then
            echo "Error: No built package found for ${PKG}"
            exit 1
          fi

          echo "Linting: $pkg_file"
          sbopkglint "$pkg_file"
