name: Build Package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ''
      slackpkg_deps:
        required: false
        type: string
        default: ''
      sbopkg_deps:
        required: false
        type: string
        default: ''

jobs:
  build-package:
    runs-on: ubuntu-latest
    container:
      image: tankmek/slackware:15.0
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Update Slackware package database
        run: |
          echo y | slackpkg gpg update
          echo y | slackpkg update
          echo y | slackpkg upgrade-all

      - name: Install baseline build tools
        run: |
          echo y | slackpkg install \
            gcc gcc-g++ make cmake autoconf automake libtool pkg-config \
            binutils gettext kernel-headers m4 glibc-i18n glibc-profile \
            guile gc patch python3
             

      - name: Install slackpkg dependencies
        if: inputs.slackpkg_deps != ''
        run: |
          echo "Installing slackpkg dependencies: ${{ inputs.slackpkg_deps }}"
          echo y | slackpkg install ${{ inputs.slackpkg_deps }}

      - name: Install sbopkg dependencies
        if: inputs.sbopkg_deps != ''
        run: |
          sbopkg -r
          for dep in ${{ inputs.sbopkg_deps }}; do
            echo "Installing sbopkg dependency: $dep"
            sbopkg -B -i "$dep"
          done

      - name: Copy package to build directory
        run: |
          PKG="${{ inputs.package }}"
          mkdir -p /tmp/SBo
          cp -r "./${PKG}" "/tmp/SBo/${PKG}"

      - name: Download source tarball
        run: |
          PKG="${{ inputs.package }}"
          cd "/tmp/SBo/${PKG}"

          if [ ! -f "${PKG}.info" ]; then
            echo "No .info file found, assuming source is bundled"
            exit 0
          fi

          DOWNLOAD_URL=$(grep '^DOWNLOAD=' "${PKG}.info" | cut -d'"' -f2)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "Error: DOWNLOAD field is empty in ${PKG}.info"
            exit 1
          fi

          echo "Downloading: $DOWNLOAD_URL"
          wget -c "$DOWNLOAD_URL"

      - name: Run SlackBuild
        run: |
          PKG="${{ inputs.package }}"
          cd "/tmp/SBo/${PKG}"

          if [ -f "${PKG}.info" ]; then
            export VERSION=$(grep '^VERSION=' "${PKG}.info" | cut -d'"' -f2)
            echo "Building ${PKG} version ${VERSION}"
          fi

          chmod +x "${PKG}.SlackBuild"
          "./${PKG}.SlackBuild"

      - name: Run sbopkglint
        run: |
          PKG="${{ inputs.package }}"

          echo "Installing sbo-maintainer-tools"
          sbopkg -r || true
          sbopkg -B -i sbo-maintainer-tools

          if [ -f "/tmp/SBo/${PKG}/${PKG}.info" ]; then
            VERSION=$(grep '^VERSION=' "/tmp/SBo/${PKG}/${PKG}.info" | cut -d'"' -f2)
          fi

          pkg_file=$(find /tmp -maxdepth 1 -name "${PKG}-${VERSION}-*.t?z" | head -n1)
          if [ -z "$pkg_file" ]; then
            echo "Error: No built package found for ${PKG}"
            exit 1
          fi

          echo "Linting: $pkg_file"
          sbopkglint "$pkg_file"
