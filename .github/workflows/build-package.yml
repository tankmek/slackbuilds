name: Build Package

on:
  workflow_call:
    inputs:
      package:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ''
      slackpkg_deps:
        required: false
        type: string
        default: ''
      sbopkg_deps:
        required: false
        type: string
        default: ''

jobs:
  build-package:
    runs-on: ubuntu-latest
    container:
      image: tankmek/slackware:15.0
      options: --privileged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Update Slackware package database
        run: |
          echo y | slackpkg gpg update
          echo y | slackpkg update
          echo y | slackpkg upgrade-all

      - name: Install baseline build tools
        run: |
          BASELINE="gcc gcc-g++ make cmake autoconf automake libtool pkg-config \
            binutils gettext kernel-headers m4 glibc-i18n glibc-profile \
            guile gc patch python3 libarchive diffutils"
          echo y | slackpkg install $BASELINE || true
          echo y | slackpkg upgrade $BASELINE || true
          ldconfig

      - name: Install slackpkg dependencies
        if: inputs.slackpkg_deps != ''
        run: |
          echo "Installing slackpkg dependencies: ${{ inputs.slackpkg_deps }}"
          echo y | slackpkg install ${{ inputs.slackpkg_deps }} || true
          echo y | slackpkg upgrade ${{ inputs.slackpkg_deps }} || true
          ldconfig

      - name: Install sbopkg dependencies
        if: inputs.sbopkg_deps != ''
        run: |
          sbopkg -r
          for dep in ${{ inputs.sbopkg_deps }}; do
            echo "Installing sbopkg dependency: $dep"
            sbopkg -B -i "$dep"
          done

      - name: Debug build environment
        run: |
          echo "=== gcc search paths ==="
          gcc -print-search-dirs | grep libraries || true
          echo ""
          echo "=== ldconfig -p | grep curl ==="
          ldconfig -p | grep -i curl || echo "no curl in ldconfig cache"
          echo ""
          echo "=== ls /usr/lib64/libcurl* ==="
          ls -la /usr/lib64/libcurl* 2>/dev/null || echo "no libcurl in /usr/lib64"
          echo ""
          echo "=== ls /usr/lib/libcurl* ==="
          ls -la /usr/lib/libcurl* 2>/dev/null || echo "no libcurl in /usr/lib"
          echo ""
          echo "=== curl-config --libs ==="
          curl-config --libs 2>/dev/null || echo "curl-config not found"
          echo ""
          echo "=== pkg-config --libs libcurl ==="
          pkg-config --libs libcurl 2>/dev/null || echo "libcurl.pc not found"
          echo ""
          echo "=== ls /usr/lib64/libpcap* ==="
          ls -la /usr/lib64/libpcap* 2>/dev/null || echo "no libpcap in /usr/lib64"
          echo ""
          echo "=== ls /usr/lib64/pkgconfig/{dbus,gio,glib,polkit}* ==="
          ls -la /usr/lib64/pkgconfig/dbus* /usr/lib64/pkgconfig/gio* /usr/lib64/pkgconfig/glib* /usr/lib64/pkgconfig/polkit* 2>/dev/null || echo "none found"
          echo ""
          echo "=== pkg-config pc_path ==="
          pkg-config --variable pc_path pkg-config 2>/dev/null || echo "failed"

      - name: Copy package to build directory
        run: |
          PKG="${{ inputs.package }}"
          mkdir -p /tmp/SBo
          cp -r "./${PKG}" "/tmp/SBo/${PKG}"

      - name: Download source tarball
        run: |
          PKG="${{ inputs.package }}"
          cd "/tmp/SBo/${PKG}"

          if [ ! -f "${PKG}.info" ]; then
            echo "No .info file found, assuming source is bundled"
            exit 0
          fi

          DOWNLOAD_URL=$(grep '^DOWNLOAD=' "${PKG}.info" | cut -d'"' -f2)
          if [ -z "$DOWNLOAD_URL" ]; then
            echo "Error: DOWNLOAD field is empty in ${PKG}.info"
            exit 1
          fi

          echo "Downloading: $DOWNLOAD_URL"
          wget -c --content-disposition "$DOWNLOAD_URL"

          # Strip query parameters from downloaded filenames (e.g. SourceForge ?viasf=1)
          for f in *\?*; do
            [ -e "$f" ] && mv "$f" "${f%%\?*}"
          done

      - name: Run SlackBuild
        run: |
          PKG="${{ inputs.package }}"
          cd "/tmp/SBo/${PKG}"

          if [ -f "${PKG}.info" ]; then
            export VERSION=$(grep '^VERSION=' "${PKG}.info" | cut -d'"' -f2)
            echo "Building ${PKG} version ${VERSION}"
          fi

          chmod +x "${PKG}.SlackBuild"
          "./${PKG}.SlackBuild"

      - name: Run sbopkglint
        run: |
          PKG="${{ inputs.package }}"

          echo "Installing sbo-maintainer-tools"
          sbopkg -r || true
          sbopkg -B -i sbo-maintainer-tools

          if [ -f "/tmp/SBo/${PKG}/${PKG}.info" ]; then
            VERSION=$(grep '^VERSION=' "/tmp/SBo/${PKG}/${PKG}.info" | cut -d'"' -f2)
          fi

          pkg_file=$(find /tmp -maxdepth 1 -name "${PKG}-${VERSION}-*.t?z" | head -n1)
          if [ -z "$pkg_file" ]; then
            echo "Error: No built package found for ${PKG}"
            exit 1
          fi

          echo "Linting: $pkg_file"
          sbopkglint "$pkg_file"
